spring:
  profiles:
    include: local
  datasource:
    url: jdbc:mysql://localhost:3306/kbo_stats?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  thymeleaf:
    cache: false
    encoding: UTF-8

  cache:
    type: caffeine
    cache-names: leagueStats
    caffeine:
      spec: expireAfterWrite=300s,maximumSize=100

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.kbo.stats.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.kbo.stats: DEBUG
    com.kbo.stats.mapper: TRACE
    org.mybatis: DEBUG
  charset:
    console: UTF-8
    file: UTF-8

server:
  port: 8080

claude:
  api:
    key: ${CLAUDE_API_KEY:dummy-key}
    base-url: https://api.anthropic.com/v1
    model: claude-haiku-4-5-20251001

chat:
  rate-limit:
    per-minute-per-ip: 10 # IP당 분당 최대 요청 수
    daily-total: 500 # 전체 일일 최대 요청 수

admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:changeme}

kbo:
  api:
    scoreboard-url: ${KBO_SCOREBOARD_URL:https://m.sports.naver.com/api/kbo/game/scoreboard}
    boxscore-url:   ${KBO_BOXSCORE_URL:https://m.sports.naver.com/api/kbo/game/boxscore}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
