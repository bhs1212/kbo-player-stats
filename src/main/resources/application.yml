spring:
  profiles:
    include: local
  datasource:
    url: jdbc:mysql://localhost:3306/kbo_stats?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  thymeleaf:
    cache: false
    encoding: UTF-8

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.kbo.stats.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.kbo.stats: DEBUG
    org.mybatis: DEBUG

server:
  port: 8080

claude:
  api:
    key: ${CLAUDE_API_KEY:dummy-key}
    base-url: https://api.anthropic.com/v1
    model: claude-haiku-4-5-20251001

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
