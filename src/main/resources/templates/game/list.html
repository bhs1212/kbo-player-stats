<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: base(
          title='경기 일정',
          content=~{::main-content},
          extraHead=~{::game-list-css},
          extraScript=~{::game-list-script})}">
<head><title>경기 일정</title></head>
<body>

<!-- ── CSS ── -->
<th:block th:fragment="game-list-css">
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css' rel='stylesheet' />
<style>
/* ── 팀 텍스트 색상 (다른 페이지 공용, 건드리지 말 것) ── */
.team-kia     { color: #EA0029; }
.team-doosan  { color: #131230; }
.team-lg      { color: #C30452; }
.team-ssg     { color: #CE0E2D; }
.team-samsung { color: #074CA1; }
.team-kt      { color: #EB1C24; }
.team-lotte   { color: #041E42; }
.team-hanwha  { color: #FC4E00; }
.team-nc      { color: #1D467D; }
.team-kiwoom  { color: #820024; }
.team-home   { font-weight: 600; }
.team-away   { font-weight: 500; }
.team-winner { font-weight: 700 !important; }
.team-loser  { color: #999 !important; font-weight: 400 !important; }

/* ── FullCalendar 기본 이벤트 박스 제거 ── */
.fc-daygrid-event {
  background: none !important;
  border: none !important;
  padding: 0 !important;
  margin: 2px 0 !important;
}
.fc-event-title, .fc-event-time { display: none !important; }
.fc-daygrid-event:hover { background: rgba(0,0,0,0.04) !important; }
.fc-daygrid-day-frame { padding: 2px; }

/* ── 캘린더 기본 설정 ── */
#calendar { min-height: 600px; }
.fc .fc-toolbar-title { font-size: 1.1rem; font-weight: 600; }

/* ── 커스텀 게임 행 ── */
.game-row {
  display: grid;
  grid-template-columns: 38px 44px 38px;
  gap: 6px;
  align-items: center;
  font-size: 11px;
  line-height: 1.4;
  cursor: pointer;
}
.game-row .badge-team {
  padding: 1px 0;
  text-align: center;
  border-radius: 10px;
  font-weight: 500;
  font-size: 10px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.score-block {
  text-align: center;
  font-size: 11px;
  white-space: nowrap;
}
.score-block .colon {
  color: #aaa;
  margin: 0 1px;
}
.score-winner-text { color: #E24B4A; font-weight: 500; }
.score-loser-text  { color: #888; }
.score-tie-text    { color: #333; }
.game-row .center-text {
  font-size: 10px;
  color: #666;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── 날짜 번호 가운데 정렬 ── */
.fc-daygrid-day-top {
  justify-content: center !important;
}
.fc-daygrid-day-number {
  float: none !important;
  text-align: center;
}

/* ── 경기 행 가운데 정렬 ── */
.fc-daygrid-day-events {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.fc-daygrid-event-harness {
  width: auto !important;
}
.game-row {
  margin: 0 auto;
}

/* ── 요일 헤더 / 날짜 번호 링크 밑줄 제거 ── */
.fc-col-header-cell-cushion,
.fc-daygrid-day-number {
  text-decoration: none !important;
}
.fc-col-header-cell-cushion:hover,
.fc-daygrid-day-number:hover {
  text-decoration: none !important;
}

/* ── LIVE 배지 깜빡임 ── */
@keyframes live-blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.3; }
}
.badge-live-blink { animation: live-blink 1.2s ease-in-out infinite; }

/* ── 카드 그리드 모바일 반응형 ── */
@media (max-width: 767.98px) {
  #gridContainer .col-md-6,
  #gridContainer .col-lg-4 {
    flex: 0 0 auto;
    width: 100%;
  }
}
</style>
</th:block>

<!-- ── 본문 ── -->
<th:block th:fragment="main-content">

<!-- 플래시 메시지 -->
<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
    <span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:if="${infoMessage}" class="alert alert-info alert-dismissible fade show" role="alert">
    <span th:text="${infoMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<!-- 페이지 헤더 -->
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">
        <i class="bi bi-calendar3 text-primary"></i> 경기 일정
    </h4>
    <div class="d-flex align-items-center gap-2">
        <!-- 뷰 토글 -->
        <div class="btn-group btn-group-sm" role="group" aria-label="View toggle">
            <button type="button" id="calendarViewBtn" class="btn btn-outline-primary active"
                    onclick="switchView('calendar')">
                <i class="bi bi-calendar3"></i> 캘린더
            </button>
            <button type="button" id="gridViewBtn" class="btn btn-outline-primary"
                    onclick="switchView('grid')">
                <i class="bi bi-grid-3x3"></i> 카드 그리드
            </button>
        </div>
        <!-- 관리자 크롤링 -->
        <div sec:authorize="hasRole('ADMIN')" class="d-flex align-items-center gap-2">
            <form th:action="@{/games/crawl}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-info btn-sm"
                        onclick="return confirm('현재 월 + 다음 월 경기 데이터를 갱신합니다. 계속하시겠습니까?')">
                    <i class="bi bi-cloud-download"></i> 경기 일정 갱신
                </button>
            </form>
            <form th:action="@{/crawling/boxscore-refresh}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-warning btn-sm"
                        onclick="return confirm('박스스코어 누락분을 수집합니다. 경기 수에 따라 시간이 걸릴 수 있습니다. 계속하시겠습니까?')">
                    <i class="bi bi-file-earmark-bar-graph"></i> 박스스코어 갱신
                </button>
            </form>
        </div>
    </div>
</div>

<!-- 팀 필터 (달력/목록 공통) -->
<div class="card mb-3">
    <div class="card-body py-2">
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <label class="form-label mb-0 small text-muted fw-semibold">팀 필터:</label>
            <select id="teamFilter" class="form-select form-select-sm" style="width:auto;"
                    onchange="onTeamChange(this.value)">
                <option value="ALL" th:selected="${selectedTeam == 'ALL' or selectedTeam == null}">전체 팀</option>
                <option th:each="t : ${teams}"
                        th:value="${t}"
                        th:text="${t}"
                        th:selected="${t == selectedTeam}"></option>
            </select>
            <span th:if="${selectedTeam != null and selectedTeam != 'ALL'}"
                  class="badge bg-warning text-dark">
                <i class="bi bi-star-fill"></i>
                <span th:text="${selectedTeam}"></span> 경기만 표시
            </span>
        </div>
    </div>
</div>

<!-- ── 캘린더 뷰 ── -->
<div id="calendarContainer">
    <div id="calendar"></div>
</div>

<!-- ── 카드 그리드 뷰 ── -->
<div id="gridContainer" style="display:none;">

    <!-- 월 네비게이션 -->
    <div class="d-flex align-items-center gap-2 mb-3">
        <a th:if="${prevMonth != null}"
           th:href="@{/games(month=${prevMonth}, team=${selectedTeam})}"
           class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-chevron-left"></i>
        </a>
        <span th:if="${prevMonth == null}" class="btn btn-outline-secondary btn-sm disabled">
            <i class="bi bi-chevron-left"></i>
        </span>

        <form th:action="@{/games}" method="get" class="d-flex align-items-center gap-1 flex-grow-1">
            <input type="hidden" name="team" th:value="${selectedTeam}">
            <select name="month" class="form-select form-select-sm" style="max-width:160px;"
                    onchange="this.form.submit()">
                <option th:each="opt : ${monthOptions}"
                        th:value="${opt[0]}"
                        th:text="${opt[1]}"
                        th:selected="${opt[0] == selectedMonth}"></option>
            </select>
            <span th:if="${isCurrentMonth}" class="badge bg-primary ms-1">이번 달</span>
        </form>

        <a th:if="${nextMonth != null}"
           th:href="@{/games(month=${nextMonth}, team=${selectedTeam})}"
           class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-chevron-right"></i>
        </a>
        <span th:if="${nextMonth == null}" class="btn btn-outline-secondary btn-sm disabled">
            <i class="bi bi-chevron-right"></i>
        </span>

        <a th:if="${!isCurrentMonth}"
           th:href="@{/games(team=${selectedTeam})}"
           class="btn btn-outline-primary btn-sm ms-1">
            <i class="bi bi-house-fill"></i> 이번 달
        </a>
    </div>

    <!-- 경기 없음 -->
    <div th:if="${isEmpty}" class="text-center py-5 text-muted">
        <i class="bi bi-calendar-x fs-1 d-block mb-3"></i>
        <h5 class="mb-2">아직 이 달의 일정이 확정되지 않았습니다</h5>
        <p class="mb-3 small">
            정규시즌은 3월~9월 초까지 진행되며,<br>
            포스트시즌 일정은 정규시즌 종료 후 확정됩니다.
        </p>
    </div>

    <!-- 날짜별 경기 목록 -->
    <div th:each="entry : ${gamesByDate}" class="mb-4">
        <div class="d-flex align-items-center mb-2">
            <h6 class="mb-0 fw-bold text-primary me-2"
                th:text="${dateLabels[entry.key]}"></h6>
            <span class="badge bg-secondary rounded-pill"
                  th:text="${entry.value.size()} + '경기'"></span>
        </div>
        <div class="row g-2">
            <div th:each="game : ${entry.value}" class="col-12 col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm"
                     th:classappend="${game.status.name() == 'POSTPONED' or game.status.name() == 'CANCELED'} ? 'opacity-50'">
                    <div class="card-body py-2 px-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span th:switch="${game.status.name()}">
                                <span th:case="'SCHEDULED'"   class="badge bg-primary">예정</span>
                                <span th:case="'IN_PROGRESS'" class="badge bg-warning text-dark">진행중</span>
                                <span th:case="'FINISHED'"    class="badge bg-success">종료</span>
                                <span th:case="'POSTPONED'"   class="badge bg-secondary">연기</span>
                                <span th:case="'CANCELED'"    class="badge bg-danger">취소</span>
                            </span>
                            <small class="text-muted" th:text="${game.stadium != null ? game.stadium : ''}"></small>
                        </div>
                        <div class="d-flex align-items-center justify-content-between">
                            <div class="text-center" style="min-width:60px;">
                                <div th:class="${game.awayTeamClass}" th:text="${game.awayTeam}"></div>
                                <small class="text-muted">원정</small>
                            </div>
                            <div class="text-center px-2">
                                <div class="fs-5 fw-bold"
                                     th:classappend="${game.status.name() == 'FINISHED'} ? 'text-dark' : 'text-muted'"
                                     th:text="${game.resultText}"></div>
                                <small class="text-muted"
                                       th:text="${game.gameTime != null} ? ${#temporals.format(game.gameTime, 'HH:mm')} : ''"></small>
                            </div>
                            <div class="text-center" style="min-width:60px;">
                                <div th:class="${game.homeTeamClass}" th:text="${game.homeTeam}"></div>
                                <small class="text-muted">홈</small>
                            </div>
                        </div>
                        <div th:if="${game.notes != null and !#strings.isEmpty(game.notes)}" class="mt-1">
                            <small class="text-secondary" th:text="${game.notes}"></small>
                        </div>
                    </div>
                    <a th:href="@{/games/{id}(id=${game.id})}"
                       class="stretched-link" aria-label="경기 상세"></a>
                </div>
            </div>
        </div>
    </div>
</div><!-- /gridContainer -->

<!-- ── 경기 상세 모달 ── -->
<div class="modal fade" id="gameDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header" id="gdmHeader">
                <h6 class="modal-title text-white" id="gdmTitle">경기 상세</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="닫기"></button>
            </div>
            <div class="modal-body" id="gdmBody"></div>
            <div class="modal-footer py-2" id="gdmFooter">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">닫기</button>
            </div>
        </div>
    </div>
</div>

</th:block>

<!-- ── JS ── -->
<th:block th:fragment="game-list-script">
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/locales/ko.global.min.js'></script>
<script th:inline="javascript">
(function () {
    var initialTeam    = /*[[${selectedTeam}]]*/ 'ALL';
    var selectedMonth  = /*[[${selectedMonth}]]*/ '';
    var currentTeam    = initialTeam;
    var calendar;

    /* ── 팀 컬러 매핑 ── */
    var TEAM_COLORS = {
        'KIA':  '#EA0029', '두산': '#131230', 'LG':  '#C30452', 'SSG': '#CE0E2D',
        '삼성': '#074CA1', 'KT':  '#EB1C24', '롯데': '#041E42', '한화': '#FC4E00',
        'NC':   '#1D467D', '키움': '#820024'
    };

    /* ── 팀 배지 HTML 생성 ── */
    function teamBadgeHtml(name, style) {
        return '<div class="badge-team" style="' + style + '">' + (name || '') + '</div>';
    }

    /* ── 게임 행 렌더링 (캘린더 셀용) ── */
    function renderGameRow(p) {
        var aC = TEAM_COLORS[p.awayTeam] || '#666';
        var hC = TEAM_COLORS[p.homeTeam] || '#666';
        var awayBadge, homeBadge, middleHtml;

        if (p.status === 'FINISHED' && p.awayScore != null && p.homeScore != null) {
            var as = parseInt(p.awayScore, 10);
            var hs = parseInt(p.homeScore, 10);
            if (as === hs) {
                awayBadge  = teamBadgeHtml(p.awayTeam, 'background:' + aC + ';color:#fff;');
                homeBadge  = teamBadgeHtml(p.homeTeam, 'background:' + hC + ';color:#fff;');
                middleHtml = '<div class="score-block">' +
                             '<span class="score-tie-text">' + as + '</span>' +
                             '<span class="colon">:</span>' +
                             '<span class="score-tie-text">' + hs + '</span>' +
                             '</div>';
            } else if (as > hs) {
                awayBadge  = teamBadgeHtml(p.awayTeam, 'background:' + aC + ';color:#fff;');
                homeBadge  = teamBadgeHtml(p.homeTeam, 'background:#fff;color:' + hC + ';border:1px solid ' + hC + ';opacity:0.6;');
                middleHtml = '<div class="score-block">' +
                             '<span class="score-winner-text">' + as + '</span>' +
                             '<span class="colon">:</span>' +
                             '<span class="score-loser-text">'  + hs + '</span>' +
                             '</div>';
            } else {
                awayBadge  = teamBadgeHtml(p.awayTeam, 'background:#fff;color:' + aC + ';border:1px solid ' + aC + ';opacity:0.6;');
                homeBadge  = teamBadgeHtml(p.homeTeam, 'background:' + hC + ';color:#fff;');
                middleHtml = '<div class="score-block">' +
                             '<span class="score-loser-text">'  + as + '</span>' +
                             '<span class="colon">:</span>' +
                             '<span class="score-winner-text">' + hs + '</span>' +
                             '</div>';
            }
        } else if (p.status === 'CANCELED') {
            awayBadge  = teamBadgeHtml(p.awayTeam, 'background:#fff;color:' + aC + ';border:1px solid ' + aC + ';');
            homeBadge  = teamBadgeHtml(p.homeTeam, 'background:#fff;color:' + hC + ';border:1px solid ' + hC + ';');
            middleHtml = '<div class="center-text">취소</div>';
        } else if (p.status === 'POSTPONED') {
            awayBadge  = teamBadgeHtml(p.awayTeam, 'background:#fff;color:' + aC + ';border:1px solid ' + aC + ';');
            homeBadge  = teamBadgeHtml(p.homeTeam, 'background:#fff;color:' + hC + ';border:1px solid ' + hC + ';');
            middleHtml = '<div class="center-text">연기</div>';
        } else {
            /* SCHEDULED / IN_PROGRESS */
            awayBadge  = teamBadgeHtml(p.awayTeam, 'background:#fff;color:' + aC + ';border:1px solid ' + aC + ';');
            homeBadge  = teamBadgeHtml(p.homeTeam, 'background:#fff;color:' + hC + ';border:1px solid ' + hC + ';');
            var label  = (p.stadium && p.stadium !== '-') ? p.stadium
                       : (p.gameTime ? p.gameTime.substring(0, 5) : '');
            middleHtml = '<div class="center-text">' + label + '</div>';
        }

        return '<div class="game-row">' + awayBadge + middleHtml + homeBadge + '</div>';
    }

    /* ── 경기 상세 모달 ── */
    var STATUS_COLOR = {
        FINISHED:    '#6c757d',
        SCHEDULED:   '#0d6efd',
        IN_PROGRESS: '#198754',
        CANCELED:    '#dc3545',
        POSTPONED:   '#6c757d'
    };
    var STATUS_KO = {
        FINISHED:    '경기 종료',
        SCHEDULED:   '예정',
        IN_PROGRESS: '경기 중',
        CANCELED:    '취소',
        POSTPONED:   '연기'
    };
    var DAY_KO = ['일', '월', '화', '수', '목', '금', '토'];

    function showGameDetailModal(event) {
        var p       = event.extendedProps;
        var id      = event.id;
        var dt      = event.start;
        var timeStr = p.gameTime ? p.gameTime.substring(0, 5) : '';

        var dateLabel = dt
            ? (dt.getMonth() + 1) + '월 ' + dt.getDate() + '일 (' + DAY_KO[dt.getDay()] + ')'
            : '';

        /* 헤더 배경색 + 제목 */
        var headerColor = STATUS_COLOR[p.status] || '#6c757d';
        var header = document.getElementById('gdmHeader');
        header.style.backgroundColor = headerColor;
        header.style.borderColor     = headerColor;
        document.getElementById('gdmTitle').textContent = dateLabel + ' 경기 상세';

        var aC = TEAM_COLORS[p.awayTeam] || '#666';
        var hC = TEAM_COLORS[p.homeTeam] || '#666';
        var baseTeamSt = 'font-size:1.1rem;font-weight:700;padding:6px 14px;border-radius:8px;display:inline-block;min-width:56px;text-align:center;';

        /* 스코어 섹션 */
        var scoreHtml;
        var isScored = (p.status === 'FINISHED' || p.status === 'IN_PROGRESS')
                       && p.awayScore != null && p.homeScore != null;

        if (isScored) {
            var as = parseInt(p.awayScore, 10);
            var hs = parseInt(p.homeScore, 10);
            var awayWin = as > hs, homeWin = hs > as;

            var aSt = awayWin ? baseTeamSt + 'background:' + aC + ';color:#fff;'
                    : homeWin ? baseTeamSt + 'background:#f8f9fa;color:' + aC + ';border:2px solid ' + aC + ';opacity:0.65;'
                    :           baseTeamSt + 'background:' + aC + ';color:#fff;';
            var hSt = homeWin ? baseTeamSt + 'background:' + hC + ';color:#fff;'
                    : awayWin  ? baseTeamSt + 'background:#f8f9fa;color:' + hC + ';border:2px solid ' + hC + ';opacity:0.65;'
                    :            baseTeamSt + 'background:' + hC + ';color:#fff;';

            var aSc = awayWin ? 'color:#E24B4A;font-weight:700;' : homeWin ? 'color:#aaa;' : 'color:#333;';
            var hSc = homeWin ? 'color:#E24B4A;font-weight:700;' : awayWin ? 'color:#aaa;' : 'color:#333;';

            var liveTag = p.status === 'IN_PROGRESS'
                ? '<div class="mt-1"><span class="badge bg-success badge-live-blink">LIVE</span></div>' : '';

            scoreHtml =
                '<div class="d-flex align-items-center justify-content-center gap-3 py-3">' +
                '  <div class="text-center">' +
                '    <div style="' + aSt + '">' + (p.awayTeam || '') + '</div>' +
                '    <div class="small text-muted mt-1">원정</div>' +
                '  </div>' +
                '  <div class="text-center">' +
                '    <div style="font-size:2.2rem;font-weight:700;line-height:1;">' +
                '      <span style="' + aSc + '">' + as + '</span>' +
                '      <span class="text-muted mx-1" style="font-size:1.3rem;">:</span>' +
                '      <span style="' + hSc + '">' + hs + '</span>' +
                '    </div>' + liveTag +
                '  </div>' +
                '  <div class="text-center">' +
                '    <div style="' + hSt + '">' + (p.homeTeam || '') + '</div>' +
                '    <div class="small text-muted mt-1">홈</div>' +
                '  </div>' +
                '</div>';
        } else {
            var subText = p.status === 'CANCELED'  ? '경기 취소'
                        : p.status === 'POSTPONED' ? '경기 연기'
                        :                            '경기 시작 전';
            var aSt2 = baseTeamSt + 'background:#f8f9fa;color:' + aC + ';border:2px solid ' + aC + ';';
            var hSt2 = baseTeamSt + 'background:#f8f9fa;color:' + hC + ';border:2px solid ' + hC + ';';
            scoreHtml =
                '<div class="d-flex align-items-center justify-content-center gap-3 py-3">' +
                '  <div class="text-center">' +
                '    <div style="' + aSt2 + '">' + (p.awayTeam || '') + '</div>' +
                '    <div class="small text-muted mt-1">원정</div>' +
                '  </div>' +
                '  <div class="text-center">' +
                '    <div class="fw-bold fs-4 text-muted">vs</div>' +
                '    <div class="small text-muted mt-1">' + subText + '</div>' +
                '  </div>' +
                '  <div class="text-center">' +
                '    <div style="' + hSt2 + '">' + (p.homeTeam || '') + '</div>' +
                '    <div class="small text-muted mt-1">홈</div>' +
                '  </div>' +
                '</div>';
        }

        /* 정보 테이블 */
        var dtStr = dt
            ? (dt.getMonth() + 1) + '/' + dt.getDate() + ' (' + DAY_KO[dt.getDay()] + ')' + (timeStr ? ' ' + timeStr : '')
            : '';
        var stadiumStr = (p.stadium && p.stadium !== '-') ? p.stadium : '-';
        var infoHtml =
            '<table class="table table-sm table-borderless small mb-0">' +
            '  <tbody>' +
            '    <tr><th class="text-muted fw-normal ps-0" style="width:60px;">일시</th><td>' + dtStr + '</td></tr>' +
            '    <tr><th class="text-muted fw-normal ps-0">경기장</th><td>' + stadiumStr + '</td></tr>' +
            '    <tr><th class="text-muted fw-normal ps-0">상태</th><td>' + (STATUS_KO[p.status] || p.status) + '</td></tr>' +
            '  </tbody>' +
            '</table>';

        document.getElementById('gdmBody').innerHTML = scoreHtml + infoHtml;

        /* 푸터 */
        var footerHtml = p.status === 'FINISHED'
            ? '<a href="/games/' + id + '" class="btn btn-primary btn-sm">박스스코어 보기</a> '
            : '';
        footerHtml += '<button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">닫기</button>';
        document.getElementById('gdmFooter').innerHTML = footerHtml;

        new bootstrap.Modal(document.getElementById('gameDetailModal')).show();
    }

    /* ── 뷰 전환 + localStorage 저장 ── */
    window.switchView = function (view) {
        var calEl  = document.getElementById('calendarContainer');
        var gridEl = document.getElementById('gridContainer');
        var btnCal = document.getElementById('calendarViewBtn');
        var btnGrd = document.getElementById('gridViewBtn');
        if (view === 'calendar') {
            calEl.style.display  = '';
            gridEl.style.display = 'none';
            btnCal.classList.add('active');
            btnGrd.classList.remove('active');
            if (calendar) calendar.updateSize();
        } else {
            calEl.style.display  = 'none';
            gridEl.style.display = '';
            btnCal.classList.remove('active');
            btnGrd.classList.add('active');
        }
        try { localStorage.setItem('schedulePreferredView', view); } catch(e) {}
    };

    /* ── 팀 필터 변경 ── */
    window.onTeamChange = function (val) {
        currentTeam = val;
        var gridEl = document.getElementById('gridContainer');
        if (gridEl && gridEl.style.display !== 'none') {
            /* 카드 그리드: 서버 필터 적용을 위해 페이지 리로드 */
            var url = '/games?team=' + encodeURIComponent(val);
            if (selectedMonth) url += '&month=' + selectedMonth;
            window.location.href = url;
        } else {
            /* 캘린더: 이벤트 재조회 */
            if (calendar) calendar.refetchEvents();
        }
    };

    /* ── FullCalendar 초기화 ── */
    document.addEventListener('DOMContentLoaded', function () {
        var calEl = document.getElementById('calendar');
        var isMobile = window.innerWidth < 768;
        calendar = new FullCalendar.Calendar(calEl, {
            locale: 'ko',
            initialView: isMobile ? 'listWeek' : 'dayGridMonth',
            headerToolbar: {
                left:   'prev,next today',
                center: 'title',
                right:  'dayGridMonth,listWeek'
            },
            buttonText: {
                today:    '오늘',
                month:    '월',
                listWeek: '주목록'
            },
            height: 'auto',
            eventDisplay: 'block',
            events: function (fetchInfo, successCallback, failureCallback) {
                var url = '/games/api/events' +
                          '?start=' + fetchInfo.startStr.substring(0, 10) +
                          '&end='   + fetchInfo.endStr.substring(0, 10) +
                          (currentTeam && currentTeam !== 'ALL'
                              ? '&team=' + encodeURIComponent(currentTeam) : '');
                fetch(url)
                    .then(function (r) { return r.json(); })
                    .then(successCallback)
                    .catch(failureCallback);
            },
            eventContent: function (arg) {
                var wrap = document.createElement('div');
                wrap.innerHTML = renderGameRow(arg.event.extendedProps);
                return { domNodes: [wrap.firstElementChild] };
            },
            eventClick: function (info) {
                info.jsEvent.preventDefault();
                showGameDetailModal(info.event);
            }
        });
        calendar.render();

        /* 저장된 뷰 복원 */
        try {
            var savedView = localStorage.getItem('schedulePreferredView');
            if (savedView === 'grid') switchView('grid');
        } catch(e) {}

        /* 768px 미만 → listWeek, 이상 → dayGridMonth 자동 전환 */
        var lastMobile = isMobile;
        window.addEventListener('resize', function () {
            var nowMobile = window.innerWidth < 768;
            if (nowMobile !== lastMobile) {
                lastMobile = nowMobile;
                calendar.changeView(nowMobile ? 'listWeek' : 'dayGridMonth');
            }
        });
    });
})();
</script>
</th:block>

</body>
</html>
