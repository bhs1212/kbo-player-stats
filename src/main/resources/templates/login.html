<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 - KBO 선수 기록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 12px;
        }
        .login-header {
            background: #212529;
            color: white;
            border-radius: 12px 12px 0 0;
            padding: 1.5rem;
            text-align: center;
        }
        .login-header .brand {
            font-size: 1.4rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="login-card card">
    <div class="login-header">
        <div class="brand">
            <i class="bi bi-baseball"></i> KBO Stats
        </div>
        <div class="small mt-1 text-secondary">로그인</div>
    </div>
    <div class="card-body p-4">
        <!-- 회원가입 성공 메시지 -->
        <div th:if="${signupSuccess}" class="alert alert-success d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-check-circle-fill"></i>
            <span>회원가입이 완료되었습니다. 로그인해주세요!</span>
        </div>

        <!-- 로그인 오류 메시지 -->
        <div th:if="${loginError}" class="alert alert-danger d-flex align-items-center gap-2" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${loginError}"></span>
        </div>

        <!-- Spring Security 폼 로그인 (POST /login 자동 처리) -->
        <form th:action="@{/login}" method="post">
            <!-- Thymeleaf가 CSRF 토큰 자동 삽입 -->
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">아이디</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" id="username" name="username"
                           class="form-control" placeholder="아이디" required autofocus />
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">비밀번호</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" id="password" name="password"
                           class="form-control" placeholder="비밀번호" required />
                </div>
            </div>
            <button type="submit" class="btn btn-dark w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i> 로그인
            </button>
        </form>

        <hr class="my-3" />
        <div class="text-center small">
            아직 회원이 아니신가요?
            <a th:href="@{/signup}" class="text-decoration-none fw-semibold">회원가입</a>
        </div>
        <div class="text-center mt-2">
            <a th:href="@{/}" class="text-muted small">
                <i class="bi bi-arrow-left"></i> 메인으로 돌아가기
            </a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
