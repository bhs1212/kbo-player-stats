<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: base(
          title=${player.name},
          content=~{::main-content},
          extraHead=~{},
          extraScript=~{})}">
<head><title>선수 상세</title></head>
<body>
<th:block th:fragment="main-content">

<div class="d-flex justify-content-between align-items-center mb-3">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a th:href="@{/players}">선수 목록</a></li>
            <li class="breadcrumb-item active" th:text="${player.name}"></li>
        </ol>
    </nav>
    <!-- 관리자 전용 수정/삭제 버튼 -->
    <div class="d-flex gap-2" sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/players/{id}/edit(id=${player.id})}" class="btn btn-warning btn-sm">
            <i class="bi bi-pencil"></i> 수정
        </a>
        <form th:action="@{/players/{id}/delete(id=${player.id})}" method="post">
            <button type="submit" class="btn btn-danger btn-sm"
                    onclick="return confirm('삭제하시겠습니까?')">
                <i class="bi bi-trash"></i> 삭제
            </button>
        </form>
    </div>
</div>

<div class="row">
    <!-- 기본 정보 -->
    <div class="col-md-4">
        <div class="card mb-3" th:classappend="${player.pitcher ? 'stat-card pitcher' : 'stat-card'}">
            <div class="card-body text-center py-4">
                <div class="display-1 mb-2">
                    <i th:if="${player.batter}"  class="bi bi-person-fill text-primary"></i>
                    <i th:if="${player.pitcher}" class="bi bi-person-fill text-danger"></i>
                </div>
                <h3 class="fw-bold mb-1" th:text="${player.name}"></h3>
                <span th:if="${player.batter}"  class="badge badge-batter fs-6 mb-2">타자</span>
                <span th:if="${player.pitcher}" class="badge badge-pitcher fs-6 mb-2">투수</span>
                <div class="mt-2">
                    <span class="badge bg-secondary fs-6 me-1" th:text="${player.team}"></span>
                    <span class="badge bg-light text-dark fs-6" th:text="${player.position}"></span>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><i class="bi bi-info-circle"></i> 기본 정보</div>
            <ul class="list-group list-group-flush">
                <li class="list-group-item d-flex justify-content-between">
                    <span class="text-muted">경기수</span>
                    <strong th:text="${player.games != null ? player.games + ' 경기' : '-'}"></strong>
                </li>
                <li class="list-group-item d-flex justify-content-between">
                    <span class="text-muted">등록일</span>
                    <strong th:text="${#temporals.format(player.createdAt, 'yyyy-MM-dd')}"></strong>
                </li>
                <li class="list-group-item d-flex justify-content-between">
                    <span class="text-muted">수정일</span>
                    <strong th:text="${#temporals.format(player.updatedAt, 'yyyy-MM-dd')}"></strong>
                </li>
            </ul>
        </div>
    </div>

    <!-- 기록 카드 -->
    <div class="col-md-8">
        <!-- 타자 기록 -->
        <div th:if="${player.batter}">
            <h5 class="mb-3"><i class="bi bi-bar-chart-fill text-primary"></i> 타자 기록</h5>
            <div class="row g-3">
                <div class="col-6 col-md-3">
                    <div class="card text-center h-100 border-primary">
                        <div class="card-body">
                            <div class="fs-1 fw-bold text-primary"
                                 th:text="${player.battingAvg != null ? #numbers.formatDecimal(player.battingAvg, 1, 3) : '-'}"></div>
                            <div class="text-muted small">타율 (AVG)</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card text-center h-100">
                        <div class="card-body">
                            <div class="fs-1 fw-bold text-warning"
                                 th:text="${player.homeRuns != null ? player.homeRuns : '-'}"></div>
                            <div class="text-muted small">홈런 (HR)</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card text-center h-100">
                        <div class="card-body">
                            <div class="fs-1 fw-bold"
                                 th:text="${player.hits != null ? player.hits : '-'}"></div>
                            <div class="text-muted small">안타 (H)</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card text-center h-100">
                        <div class="card-body">
                            <div class="fs-1 fw-bold text-success"
                                 th:text="${player.rbi != null ? player.rbi : '-'}"></div>
                            <div class="text-muted small">타점 (RBI)</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 투수 기록 -->
        <div th:if="${player.pitcher}">
            <h5 class="mb-3"><i class="bi bi-bar-chart-fill text-danger"></i> 투수 기록</h5>
            <div class="row g-3">
                <div class="col-6 col-md-4">
                    <div class="card text-center h-100 border-danger">
                        <div class="card-body">
                            <div class="fs-1 fw-bold text-danger"
                                 th:text="${player.era != null ? #numbers.formatDecimal(player.era, 1, 2) : '-'}"></div>
                            <div class="text-muted small">방어율 (ERA)</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="card text-center h-100">
                        <div class="card-body">
                            <div class="fs-1 fw-bold text-primary"
                                 th:text="${player.wins != null ? player.wins : '-'}"></div>
                            <div class="text-muted small">승 (W)</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="card text-center h-100">
                        <div class="card-body">
                            <div class="fs-1 fw-bold"
                                 th:text="${player.games != null ? player.games : '-'}"></div>
                            <div class="text-muted small">경기수</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="mt-3">
    <a th:href="@{/players}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> 목록으로
    </a>
</div>

</th:block>
</body>
</html>
