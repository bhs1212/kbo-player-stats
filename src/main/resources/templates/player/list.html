<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: base(
          title='선수 목록',
          content=~{::main-content},
          extraHead=~{},
          extraScript=~{})}">
<head><title>선수 목록</title></head>
<body>
<th:block th:fragment="main-content">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-people-fill text-primary"></i> 선수 목록</h4>
    <!-- 관리자 전용 버튼 -->
    <div class="d-flex gap-2" sec:authorize="hasRole('ADMIN')">
        <button class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#importModal">
            <i class="bi bi-upload"></i> CSV 임포트
        </button>
        <form th:action="@{/crawling/run}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-info btn-sm"
                    onclick="return confirm('크롤링을 실행하시겠습니까? (시간이 걸릴 수 있습니다)')">
                <i class="bi bi-cloud-download"></i> 크롤링 실행
            </button>
        </form>
        <a th:href="@{/players/new}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg"></i> 선수 등록
        </a>
    </div>
</div>
<div class="alert alert-info border-0 mb-3">
    <div class="d-flex align-items-start">
        <i class="bi bi-info-circle me-2 mt-1"></i>
        <div class="small">
            <strong>📊 표시 기준</strong>
            <ul class="mb-0 mt-1">
                <li>매일 KBO 공식 데이터 기반 갱신</li>
            </ul>
        </div>
    </div>
</div>

<!-- 타자/투수 탭 -->
<ul class="nav nav-tabs mb-3">
    <li class="nav-item">
        <a class="nav-link" th:classappend="${isBatter} ? 'active'"
           th:href="@{/players(playerType='BATTER')}">
            <i class="bi bi-person-fill text-primary"></i> 타자
        </a>
    </li>
    <li class="nav-item">
        <a class="nav-link" th:classappend="${!isBatter} ? 'active'"
           th:href="@{/players(playerType='PITCHER')}">
            <i class="bi bi-person-fill text-danger"></i> 투수
        </a>
    </li>
</ul>

<!-- 검색 필터 -->
<div class="card mb-3">
    <div class="card-body">
        <form th:action="@{/players}" method="get" class="row g-2 align-items-end">
            <input type="hidden" name="playerType" th:value="${searchDto.playerType}">
            <div class="col-md-3">
                <label class="form-label small text-muted">선수명</label>
                <input type="text" name="name" class="form-control form-control-sm"
                       placeholder="선수명 검색" th:value="${searchDto.name}">
            </div>
            <div class="col-md-3">
                <label class="form-label small text-muted">팀</label>
                <select name="team" class="form-select form-select-sm">
                    <option value="">전체 팀</option>
                    <option th:each="team : ${teams}"
                            th:value="${team}"
                            th:text="${team}"
                            th:selected="${team == searchDto.team}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label small text-muted">포지션</label>
                <input type="text" name="position" class="form-control form-control-sm"
                       placeholder="포지션" th:value="${searchDto.position}">
            </div>
            <div class="col-md-3 d-flex gap-1">
                <button type="submit" class="btn btn-primary btn-sm w-100">
                    <i class="bi bi-search"></i> 검색
                </button>
                <a th:href="@{/players(playerType=${searchDto.playerType})}" class="btn btn-outline-secondary btn-sm">초기화</a>
            </div>
        </form>
    </div>
</div>

<!-- 결과 요약 -->
<div class="d-flex justify-content-between align-items-center mb-2">
    <small class="text-muted">
        총 <strong th:text="${page.total}">0</strong>명
    </small>
    <small class="text-muted" th:text="${page.page} + ' / ' + ${page.totalPages} + ' 페이지'"></small>
</div>

<!-- 타자 테이블 -->
<div class="table-responsive" th:if="${isBatter}">
    <table class="table table-hover table-bordered align-middle">
        <thead>
        <tr>
            <th>이름</th>
            <th>팀</th>
            <th>포지션</th>
            <th>타율</th>
            <th>홈런</th>
            <th>안타</th>
            <th>타점</th>
            <th>경기</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${page.content.isEmpty()}">
            <td colspan="9" class="text-center text-muted py-4">
                <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                등록된 선수가 없습니다.
            </td>
        </tr>
        <tr th:each="player : ${page.content}">
            <td>
                <a th:href="@{/players/{id}(id=${player.id})}"
                   class="fw-bold text-decoration-none" th:text="${player.name}"></a>
            </td>
            <td th:text="${player.team}"></td>
            <td th:text="${player.position}"></td>
            <td th:text="${player.battingAvg != null ? #numbers.formatDecimal(player.battingAvg, 1, 3) : '-'}"></td>
            <td th:text="${player.homeRuns != null ? player.homeRuns : '-'}"></td>
            <td th:text="${player.hits != null ? player.hits : '-'}"></td>
            <td th:text="${player.rbi != null ? player.rbi : '-'}"></td>
            <td th:text="${player.games != null ? player.games : '-'}"></td>
            <td>
                <div class="d-flex gap-1" sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/players/{id}/edit(id=${player.id})}"
                       class="btn btn-outline-warning btn-sm">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <form th:action="@{/players/{id}/delete(id=${player.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-danger btn-sm"
                                onclick="return confirm('삭제하시겠습니까?')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- 투수 테이블 -->
<div class="table-responsive" th:if="${!isBatter}">
    <table class="table table-hover table-bordered align-middle">
        <thead>
        <tr>
            <th>이름</th>
            <th>팀</th>
            <th>포지션</th>
            <th>방어율</th>
            <th>승</th>
            <th>경기</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${page.content.isEmpty()}">
            <td colspan="7" class="text-center text-muted py-4">
                <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                등록된 선수가 없습니다.
            </td>
        </tr>
        <tr th:each="player : ${page.content}">
            <td>
                <a th:href="@{/players/{id}(id=${player.id})}"
                   class="fw-bold text-decoration-none" th:text="${player.name}"></a>
            </td>
            <td th:text="${player.team}"></td>
            <td th:text="${player.position}"></td>
            <td th:text="${player.era != null ? #numbers.formatDecimal(player.era, 1, 2) : '-'}"></td>
            <td th:text="${player.wins != null ? player.wins : '-'}"></td>
            <td th:text="${player.games != null ? player.games : '-'}"></td>
            <td>
                <div class="d-flex gap-1" sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/players/{id}/edit(id=${player.id})}"
                       class="btn btn-outline-warning btn-sm">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <form th:action="@{/players/{id}/delete(id=${player.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-danger btn-sm"
                                onclick="return confirm('삭제하시겠습니까?')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- 페이징 -->
<nav th:if="${page.totalPages > 1}">
    <ul class="pagination pagination-sm justify-content-center">
        <li class="page-item" th:classappend="${!page.hasPrevious()} ? 'disabled'">
            <a class="page-link"
               th:href="@{/players(page=${page.page - 1}, name=${searchDto.name}, team=${searchDto.team}, playerType=${searchDto.playerType}, position=${searchDto.position})}">
                &laquo;
            </a>
        </li>
        <li th:each="i : ${#numbers.sequence(page.startPage, page.endPage)}"
            class="page-item" th:classappend="${i == page.page} ? 'active'">
            <a class="page-link"
               th:href="@{/players(page=${i}, name=${searchDto.name}, team=${searchDto.team}, playerType=${searchDto.playerType}, position=${searchDto.position})}"
               th:text="${i}"></a>
        </li>
        <li class="page-item" th:classappend="${!page.hasNext()} ? 'disabled'">
            <a class="page-link"
               th:href="@{/players(page=${page.page + 1}, name=${searchDto.name}, team=${searchDto.team}, playerType=${searchDto.playerType}, position=${searchDto.position})}">
                &raquo;
            </a>
        </li>
    </ul>
</nav>

<!-- CSV 임포트 모달 (관리자 전용) -->
<div class="modal fade" id="importModal" tabindex="-1" sec:authorize="hasRole('ADMIN')">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/players/import}" method="post" enctype="multipart/form-data">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-upload"></i> CSV 파일 임포트</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small">
                        CSV 파일 형식: <code>name,team,position,playerType,battingAvg,homeRuns,hits,rbi,era,wins,games</code>
                    </p>
                    <input type="file" name="file" class="form-control" accept=".csv" required>
                    <div class="mt-2">
                        <a th:href="@{/data/players-sample.csv}" class="btn btn-link btn-sm p-0">
                            <i class="bi bi-download"></i> 샘플 CSV 다운로드
                        </a>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="submit" class="btn btn-primary">임포트</button>
                </div>
            </form>
        </div>
    </div>
</div>

</th:block>
</body>
</html>
