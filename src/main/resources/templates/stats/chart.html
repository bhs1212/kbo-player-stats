<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: base(
          title='통계 차트',
          content=~{::main-content},
          extraHead=~{::extra-head},
          extraScript=~{::extra-script})}">
<head>
    <title>통계 차트</title>
    <th:block th:fragment="extra-head">
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    </th:block>
</head>
<body>
<th:block th:fragment="main-content">

<h4 class="mb-4"><i class="bi bi-bar-chart-fill text-primary"></i> 팀별 통계 차트</h4>

<div class="row g-4">
    <!-- 팀별 홈런 수 -->
    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-header fw-semibold">
                <i class="bi bi-circle-fill text-warning"></i> 팀별 총 홈런 수
            </div>
            <div class="card-body">
                <canvas id="homeRunChart" height="300"></canvas>
            </div>
        </div>
    </div>

    <!-- 팀별 평균 타율 -->
    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-header fw-semibold">
                <i class="bi bi-activity text-primary"></i> 팀별 평균 타율
            </div>
            <div class="card-body">
                <canvas id="battingAvgChart" height="300"></canvas>
            </div>
        </div>
    </div>

    <!-- 팀별 선수 수 -->
    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-header fw-semibold">
                <i class="bi bi-people-fill text-success"></i> 팀별 등록 선수 수 (타자)
            </div>
            <div class="card-body">
                <canvas id="playerCountChart" height="300"></canvas>
            </div>
        </div>
    </div>

    <!-- 홈런 vs 타율 산점도 -->
    <div class="col-md-6">
        <div class="card h-100">
            <div class="card-header fw-semibold">
                <i class="bi bi-graph-up text-danger"></i> 팀별 홈런 vs 평균 타율
            </div>
            <div class="card-body">
                <canvas id="scatterChart" height="300"></canvas>
            </div>
        </div>
    </div>
</div>

<!-- 팀 통계 테이블 -->
<div class="card mt-4">
    <div class="card-header fw-semibold">팀별 통계 요약</div>
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead>
                <tr>
                    <th>순위</th><th>팀</th><th>등록 선수(타자)</th>
                    <th>총 홈런</th><th>평균 타율</th>
                </tr>
            </thead>
            <tbody>
            <tr th:each="stat, i : ${teamStats}">
                <td th:text="${i.index + 1}"></td>
                <td><strong th:text="${stat.team}"></strong></td>
                <td th:text="${stat.playerCount}"></td>
                <td th:text="${stat.totalHomeRuns}"></td>
                <td th:text="${stat.avgBattingAvg != null ? #numbers.formatDecimal(stat.avgBattingAvg, 1, 3) : '-'}"></td>
            </tr>
            <tr th:if="${teamStats.isEmpty()}">
                <td colspan="5" class="text-center text-muted py-3">데이터가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</th:block>

<th:block th:fragment="extra-script">
<script th:inline="javascript">
    const teamStats = /*[[${teamStats}]]*/ [];

    const labels      = teamStats.map(s => s.team);
    const homeRuns    = teamStats.map(s => s.totalHomeRuns   ?? 0);
    const battingAvgs = teamStats.map(s => s.avgBattingAvg   ?? 0);
    const playerCount = teamStats.map(s => s.playerCount     ?? 0);

    const TEAM_COLOR_MAP = {
        // 전체 이름
        'KIA 타이거즈':  '#EA0029',
        '삼성 라이온즈': '#074CA1',
        'LG 트윈스':     '#C30452',
        '두산 베어스':   '#131230',
        '롯데 자이언츠': '#002955',
        'SSG 랜더스':    '#CE0E2D',
        'NC 다이노스':   '#315288',
        'KT 위즈':       '#000000',
        '키움 히어로즈': '#570514',
        '한화 이글스':   '#FF6600',
        // 크롤링 약칭 (Statiz / KBO 공식)
        'KIA':  '#EA0029',
        '삼성': '#074CA1',
        'LG':   '#C30452',
        '두산': '#131230',
        '롯데': '#002955',
        'SSG':  '#CE0E2D',
        'NC':   '#315288',
        'KT':   '#000000',
        '키움': '#570514',
        '한화': '#FF6600'
    };
    const DEFAULT_COLOR = '#888888';

    function resolveTeamColor(teamName) {
        if (!teamName) return DEFAULT_COLOR;
        const exact = TEAM_COLOR_MAP[teamName.trim()];
        if (exact) return exact;
        // 부분 일치 fallback (e.g. "키움 히어로즈" ↔ "키움")
        const lowerName = teamName.trim().toLowerCase();
        for (const [key, color] of Object.entries(TEAM_COLOR_MAP)) {
            const lowerKey = key.toLowerCase();
            if (lowerName.includes(lowerKey) || lowerKey.includes(lowerName)) return color;
        }
        return DEFAULT_COLOR;
    }

    const TEAM_COLORS = labels.map(t => resolveTeamColor(t));

    // 1) 팀별 홈런 수 (Bar)
    new Chart(document.getElementById('homeRunChart'), {
        type: 'bar',
        data: {
            labels,
            datasets: [{
                label: '홈런 수',
                data: homeRuns,
                backgroundColor: TEAM_COLORS,
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
        }
    });

    // 2) 팀별 평균 타율 (Horizontal Bar)
    new Chart(document.getElementById('battingAvgChart'), {
        type: 'bar',
        data: {
            labels,
            datasets: [{
                label: '평균 타율',
                data: battingAvgs,
                backgroundColor: TEAM_COLORS,
                borderRadius: 4
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { x: { beginAtZero: true, max: 0.4 } }
        }
    });

    // 3) 팀별 선수 수 (Doughnut)
    new Chart(document.getElementById('playerCountChart'), {
        type: 'doughnut',
        data: {
            labels,
            datasets: [{
                data: playerCount,
                backgroundColor: TEAM_COLORS
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'right' }
            }
        }
    });

    // 4) 홈런 vs 타율 산점도 (Scatter)
    const scatterData = teamStats.map((s, i) => ({
        x: s.avgBattingAvg ?? 0,
        y: s.totalHomeRuns ?? 0,
        label: s.team
    }));

    new Chart(document.getElementById('scatterChart'), {
        type: 'scatter',
        data: {
            datasets: scatterData.map((d, i) => ({
                label: d.label,
                data: [{ x: d.x, y: d.y }],
                backgroundColor: TEAM_COLORS[i % TEAM_COLORS.length],
                pointRadius: 8,
                pointHoverRadius: 12
            }))
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'right' },
                tooltip: {
                    callbacks: {
                        label: ctx => `${ctx.dataset.label}: 타율 ${ctx.parsed.x.toFixed(3)}, 홈런 ${ctx.parsed.y}`
                    }
                }
            },
            scales: {
                x: { title: { display: true, text: '평균 타율' } },
                y: { title: { display: true, text: '총 홈런' }, beginAtZero: true }
            }
        }
    });
</script>
</th:block>

</body>
</html>
