<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: base(
          ${favoriteTeam} + ' 선수 목록',
          ~{::main-content},
          ~{},
          ~{}
      )}">
<body>
<th:block th:fragment="main-content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">
            <i class="bi bi-star-fill text-warning me-1"></i>
            <span th:text="${favoriteTeam} + '의 선수들'"></span>
        </h4>
        <a th:href="@{/my/profile}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i> 마이페이지
        </a>
    </div>

    <!-- 타자/투수 탭 -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${isBatter} ? 'active'"
               th:href="@{/my/team(playerType='BATTER')}">
                <i class="bi bi-person-fill text-primary"></i> 타자
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${!isBatter} ? 'active'"
               th:href="@{/my/team(playerType='PITCHER')}">
                <i class="bi bi-person-fill text-danger"></i> 투수
            </a>
        </li>
    </ul>

    <!-- 결과 요약 -->
    <div class="d-flex justify-content-between align-items-center mb-2">
        <small class="text-muted">
            총 <strong th:text="${pageDto.total}">0</strong>명
        </small>
        <small class="text-muted"
               th:text="${pageDto.page} + ' / ' + ${pageDto.totalPages} + ' 페이지'"></small>
    </div>

    <!-- 타자 테이블 -->
    <div class="table-responsive" th:if="${isBatter}">
        <table class="table table-hover table-bordered align-middle">
            <thead>
            <tr>
                <th>이름</th>
                <th>포지션</th>
                <th>타율</th>
                <th>홈런</th>
                <th>안타</th>
                <th>타점</th>
                <th>경기</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${pageDto.content.isEmpty()}">
                <td colspan="7" class="text-center text-muted py-4">
                    <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                    등록된 선수가 없습니다.
                </td>
            </tr>
            <tr th:each="player : ${pageDto.content}">
                <td>
                    <a th:href="@{/players/{id}(id=${player.id})}"
                       class="fw-bold text-decoration-none" th:text="${player.name}"></a>
                </td>
                <td th:text="${player.position}"></td>
                <td th:text="${player.battingAvg != null ? #numbers.formatDecimal(player.battingAvg, 1, 3) : '-'}"></td>
                <td th:text="${player.homeRuns != null ? player.homeRuns : '-'}"></td>
                <td th:text="${player.hits != null ? player.hits : '-'}"></td>
                <td th:text="${player.rbi != null ? player.rbi : '-'}"></td>
                <td th:text="${player.games != null ? player.games : '-'}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 투수 테이블 -->
    <div class="table-responsive" th:if="${!isBatter}">
        <table class="table table-hover table-bordered align-middle">
            <thead>
            <tr>
                <th>이름</th>
                <th>포지션</th>
                <th>방어율</th>
                <th>승</th>
                <th>세이브</th>
                <th>홀드</th>
                <th>경기</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${pageDto.content.isEmpty()}">
                <td colspan="7" class="text-center text-muted py-4">
                    <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                    등록된 선수가 없습니다.
                </td>
            </tr>
            <tr th:each="player : ${pageDto.content}">
                <td>
                    <a th:href="@{/players/{id}(id=${player.id})}"
                       class="fw-bold text-decoration-none" th:text="${player.name}"></a>
                </td>
                <td th:text="${player.position}"></td>
                <td th:text="${player.era != null ? #numbers.formatDecimal(player.era, 1, 2) : '-'}"></td>
                <td th:text="${player.wins != null ? player.wins : '-'}"></td>
                <td th:text="${player.saves != null ? player.saves : '-'}"></td>
                <td th:text="${player.holds != null ? player.holds : '-'}"></td>
                <td th:text="${player.games != null ? player.games : '-'}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 페이징 -->
    <nav th:if="${pageDto.totalPages > 1}">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item" th:classappend="${!pageDto.hasPrevious()} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/my/team(page=${pageDto.page - 1}, playerType=${searchDto.playerType})}">&laquo;</a>
            </li>
            <li th:each="i : ${#numbers.sequence(pageDto.startPage, pageDto.endPage)}"
                class="page-item" th:classappend="${i == pageDto.page} ? 'active'">
                <a class="page-link"
                   th:href="@{/my/team(page=${i}, playerType=${searchDto.playerType})}"
                   th:text="${i}"></a>
            </li>
            <li class="page-item" th:classappend="${!pageDto.hasNext()} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/my/team(page=${pageDto.page + 1}, playerType=${searchDto.playerType})}">&raquo;</a>
            </li>
        </ul>
    </nav>

</th:block>
</body>
</html>
