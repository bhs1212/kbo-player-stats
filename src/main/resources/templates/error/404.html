<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: base(
          title='404 - 페이지 없음',
          content=~{::main-content},
          extraHead=~{},
          extraScript=~{})}">
<head><title>404</title></head>
<body>
<th:block th:fragment="main-content">
<div class="text-center py-5">
    <div class="display-1 text-muted">404</div>
    <h3>페이지를 찾을 수 없습니다.</h3>
    <p class="text-muted" th:text="${message}">요청하신 선수 또는 페이지가 존재하지 않습니다.</p>
    <a th:href="@{/players}" class="btn btn-primary mt-2">
        <i class="bi bi-house-fill"></i> 홈으로
    </a>
</div>
</th:block>
</body>
</html>
