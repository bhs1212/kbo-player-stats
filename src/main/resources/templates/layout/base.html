<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:fragment="base(title, content, extraHead, extraScript)"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title
      th:text="${title != null ? title + ' - KBO 선수 기록' : 'KBO 선수 기록 시스템'}"
    >
      KBO 선수 기록
    </title>
    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .navbar-brand {
        font-weight: 700;
        font-size: 1.4rem;
      }
      .badge-batter {
        background-color: #0d6efd;
      }
      .badge-pitcher {
        background-color: #dc3545;
      }
      .stat-card {
        border-left: 4px solid #0d6efd;
      }
      .stat-card.pitcher {
        border-left-color: #dc3545;
      }
      .rank-num {
        font-size: 1.4rem;
        font-weight: 700;
        color: #6c757d;
      }
      .rank-num.gold {
        color: #ffc107;
      }
      .rank-num.silver {
        color: #adb5bd;
      }
      .rank-num.bronze {
        color: #cd7f32;
      }
      .table th {
        white-space: nowrap;
        background-color: #f1f3f5;
      }
      footer {
        margin-top: 4rem;
        padding: 1.5rem 0;
        background: #343a40;
        color: #adb5bd;
      }
    </style>
    <th:block th:replace="${extraHead}"></th:block>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" th:href="@{/players}">
          <i class="bi bi-baseball"></i> KBO Stats
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" th:href="@{/players}">
                <i class="bi bi-people-fill"></i> 선수 목록
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/ranking}">
                <i class="bi bi-trophy-fill"></i> 랭킹
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/stats/chart}">
                <i class="bi bi-bar-chart-fill"></i> 통계 차트
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/games}">
                <i class="bi bi-calendar3"></i> 경기 일정
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/chat}">
                <i class="bi bi-robot"></i> 챗봇
              </a>
            </li>
          </ul>
          <div class="d-flex gap-2 align-items-center">
            <!-- 관리자 전용: 선수 등록 버튼 -->
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/players/new}" class="btn btn-outline-light btn-sm">
              <i class="bi bi-plus-lg"></i> 선수 등록
            </a>
            <!-- 일반 회원 전용: 내 페이지 / 내 팀 링크 -->
            <a sec:authorize="hasRole('USER')"
               th:href="@{/my/profile}" class="btn btn-outline-light btn-sm">
              <i class="bi bi-person-circle"></i> 내 페이지
            </a>
            <a sec:authorize="hasRole('USER')"
               th:href="@{/my/team}" class="btn btn-outline-warning btn-sm">
              <i class="bi bi-star-fill"></i> 내 팀
            </a>
            <!-- 비로그인: 회원가입 + 로그인 링크 -->
            <a sec:authorize="!isAuthenticated()"
               th:href="@{/signup}" class="btn btn-outline-light btn-sm">
              <i class="bi bi-person-plus-fill"></i> 회원가입
            </a>
            <a sec:authorize="!isAuthenticated()"
               th:href="@{/login}" class="btn btn-outline-secondary btn-sm">
              <i class="bi bi-box-arrow-in-right"></i> 로그인
            </a>
            <!-- 로그인 시 사용자명 + 로그아웃 버튼 -->
            <span sec:authorize="isAuthenticated()"
                  class="text-light small me-1">
              <i class="bi bi-person-circle"></i>
              <span sec:authentication="name"></span>
            </span>
            <form sec:authorize="isAuthenticated()"
                  th:action="@{/logout}" method="post" class="d-inline">
              <button type="submit" class="btn btn-outline-danger btn-sm">
                <i class="bi bi-box-arrow-right"></i> 로그아웃
              </button>
            </form>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <!-- 알림 메시지 -->
      <div
        th:if="${successMessage}"
        class="alert alert-success alert-dismissible fade show"
        role="alert"
      >
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      <div
        th:if="${errorMessage}"
        class="alert alert-danger alert-dismissible fade show"
        role="alert"
      >
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      <div
        th:if="${param.accessDenied != null}"
        class="alert alert-warning alert-dismissible fade show"
        role="alert"
      >
        <i class="bi bi-shield-exclamation me-2"></i>
        관리자 권한이 필요한 페이지입니다.
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>

      <th:block th:replace="${content}"></th:block>
    </main>

    <footer class="text-center">
      <div class="container">
        <small
          >KBO Player Stats System &copy; 2025 | Spring Boot 3 + MyBatis +
          Thymeleaf</small
        >
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <th:block th:replace="${extraScript}"></th:block>
  </body>
</html>
