<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 - KBO 선수 기록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        .signup-card {
            width: 100%;
            max-width: 440px;
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 12px;
        }
        .signup-header {
            background: #212529;
            color: white;
            border-radius: 12px 12px 0 0;
            padding: 1.5rem;
            text-align: center;
        }
        .signup-header .brand {
            font-size: 1.4rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="signup-card card">
    <div class="signup-header">
        <div class="brand">
            <i class="bi bi-baseball"></i> KBO Stats
        </div>
        <div class="small mt-1 text-secondary">회원가입</div>
    </div>
    <div class="card-body p-4">

        <form th:action="@{/signup}" th:object="${signUpDto}" method="post" novalidate>
            <!-- CSRF 토큰은 Thymeleaf가 자동 삽입 -->

            <!-- 전역 에러 메시지 -->
            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-1"></i>
                <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
            </div>

            <!-- 아이디 -->
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">아이디</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" id="username" th:field="*{username}"
                           class="form-control" th:classappend="${#fields.hasErrors('username')} ? ' is-invalid'"
                           placeholder="영문/숫자/언더스코어 4~20자" autofocus />
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
                         th:errors="*{username}"></div>
                </div>
            </div>

            <!-- 비밀번호 -->
            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">비밀번호</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" id="password" th:field="*{password}"
                           class="form-control" th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'"
                           placeholder="최소 8자 이상" />
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}"></div>
                </div>
            </div>

            <!-- 비밀번호 확인 -->
            <div class="mb-3">
                <label for="passwordConfirm" class="form-label fw-semibold">비밀번호 확인</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}"
                           class="form-control" th:classappend="${#fields.hasErrors('passwordConfirm')} ? ' is-invalid'"
                           placeholder="비밀번호를 한 번 더 입력" />
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('passwordConfirm')}"
                         th:errors="*{passwordConfirm}"></div>
                </div>
            </div>

            <!-- 응원 팀 선택 -->
            <div class="mb-4">
                <label for="favoriteTeam" class="form-label fw-semibold">응원 팀</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-star-fill"></i></span>
                    <select id="favoriteTeam" th:field="*{favoriteTeam}"
                            class="form-select" th:classappend="${#fields.hasErrors('favoriteTeam')} ? ' is-invalid'">
                        <option value="">-- 팀을 선택하세요 --</option>
                        <option th:each="team : ${teams}" th:value="${team}" th:text="${team}"></option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('favoriteTeam')}"
                         th:errors="*{favoriteTeam}"></div>
                </div>
            </div>

            <button type="submit" class="btn btn-dark w-100">
                <i class="bi bi-person-plus-fill me-1"></i> 가입하기
            </button>
        </form>

        <hr class="my-3" />
        <div class="text-center small">
            이미 회원이신가요?
            <a th:href="@{/login}" class="text-decoration-none fw-semibold">로그인</a>
        </div>
        <div class="text-center mt-2">
            <a th:href="@{/}" class="text-muted small">
                <i class="bi bi-arrow-left"></i> 메인으로 돌아가기
            </a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
